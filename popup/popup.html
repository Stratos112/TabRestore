<!--extension pop up html-->

<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
</head>

<body>
    <div id="frame">
        <div id="popup-content">
            <button id="settings"><img src="../icons/6d539.png" alt="Settings" /></button>
            <button id="save">Save Tabs</button>
            <button id="load">Load Tabs</button>
        </div>
        <div id="settings-overlay" class="hidden">
            <button id="back"><img src="../icons/22c758.png" alt="Back" /></button>
            <div class="settings-row" data-tip="On: adds loaded tabs to your current session. Off: replaces all current tabs with those from the file.">
                <span>Keep Current Tabs</span>
                <label class="toggle">
                    <input type="checkbox" id="preserve-tabs">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="settings-row" data-tip="When off, pinned tabs are excluded from saved sessions.">
                <span>Include Pinned Tabs</span>
                <label class="toggle">
                    <input type="checkbox" id="include-pinned">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="settings-row" data-tip="Skips duplicate URLs when saving. When loading, skips any URLs already open in your session.">
                <span>Skip Duplicate URLs</span>
                <label class="toggle">
                    <input type="checkbox" id="remove-duplicates">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        <div id="error-content" class="hidden">
            <p>Try a different page.</p>
        </div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
